<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>統計與機率模擬 | 數學互動實驗室</title>
    <meta name="description" content="透過骰子模擬、直方圖和常態分佈曲線，直觀理解基本統計概念與大數法則。">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Outfit:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../tokens.css">
    <link rel="stylesheet" href="../nav-global.css">
    <style>
        .page-container { max-width: var(--max-width-xl); margin: 0 auto; padding: var(--space-6); }
        .sim-hero { text-align: center; padding: var(--space-10) var(--space-4); margin-bottom: var(--space-8); }
        .sim-hero__badge { display: inline-flex; align-items: center; gap: var(--space-2); background: var(--color-math-light); color: var(--color-math); padding: var(--space-2) var(--space-4); border-radius: var(--border-radius-full); font-size: var(--text-sm); font-weight: 600; margin-bottom: var(--space-4); }
        .sim-hero h1 { font-family: var(--font-heading); font-size: clamp(1.8rem,4vw,var(--text-4xl)); color: var(--text-primary); margin-bottom: var(--space-3); }
        .sim-hero p { color: var(--text-secondary); font-size: var(--text-lg); max-width: 600px; margin: 0 auto; }
        .back-link { display: inline-flex; align-items: center; gap: var(--space-2); margin-bottom: var(--space-4); color: var(--text-secondary); font-size: var(--text-sm); }
        .back-link:hover { color: var(--color-math); }

        /* 模式切換 */
        .mode-tabs { display: flex; gap: var(--space-2); margin-bottom: var(--space-6); background: var(--bg-surface); border: 1px solid var(--border-color); border-radius: var(--border-radius-lg); padding: var(--space-2); }
        .mode-tab { flex: 1; padding: var(--space-3); text-align: center; border-radius: var(--border-radius-md); cursor: pointer; font-weight: 600; font-size: var(--text-sm); border: none; background: transparent; color: var(--text-secondary); font-family: var(--font-body); transition: all var(--transition-fast); }
        .mode-tab.active { background: var(--color-math); color: white; }
        .mode-tab:hover:not(.active) { background: var(--bg-surface-hover); }

        .sim-panel { display: none; }
        .sim-panel.active { display: block; }

        /* 骰子模擬 */
        .dice-area { display: flex; gap: var(--space-6); flex-wrap: wrap; margin-bottom: var(--space-8); }
        .dice-visual { flex: 1; min-width: 280px; background: var(--bg-surface); border: 1px solid var(--border-color); border-radius: var(--border-radius-lg); padding: var(--space-6); text-align: center; }
        .dice-display { font-size: 5rem; margin: var(--space-4) 0; animation: none; }
        .dice-display.rolling { animation: diceRoll 0.2s ease infinite; }
        @keyframes diceRoll { 0%{transform:rotate(0deg)} 25%{transform:rotate(10deg)} 75%{transform:rotate(-10deg)} 100%{transform:rotate(0deg)} }
        .dice-btn-row { display: flex; gap: var(--space-2); justify-content: center; flex-wrap: wrap; margin-top: var(--space-4); }
        .dice-btn { padding: var(--space-2) var(--space-5); border-radius: var(--border-radius-md); border: none; font-weight: 600; cursor: pointer; font-family: var(--font-body); font-size: var(--text-sm); transition: all var(--transition-fast); }
        .dice-btn--primary { background: var(--color-math); color: white; }
        .dice-btn--primary:hover { opacity: 0.9; transform: translateY(-1px); }
        .dice-btn--secondary { background: var(--bg-color); color: var(--text-secondary); border: 1px solid var(--border-color); }
        .dice-btn--secondary:hover { border-color: var(--color-math); color: var(--color-math); }

        .dice-chart { flex: 2; min-width: 350px; background: var(--bg-surface); border: 1px solid var(--border-color); border-radius: var(--border-radius-lg); overflow: hidden; }
        .dice-chart canvas { display: block; width: 100%; height: 300px; }

        /* 統計數值 */
        .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: var(--space-4); margin-bottom: var(--space-8); }
        .stat-card { background: var(--bg-surface); border: 1px solid var(--border-color); border-radius: var(--border-radius-md); padding: var(--space-4); text-align: center; }
        .stat-card__label { font-size: var(--text-xs); color: var(--text-tertiary); font-weight: 600; }
        .stat-card__value { font-family: var(--font-mono); font-size: var(--text-xl); font-weight: 700; color: var(--color-math); }

        /* 常態分佈 */
        .normal-controls { display: flex; gap: var(--space-4); flex-wrap: wrap; margin-bottom: var(--space-4); background: var(--bg-surface); border: 1px solid var(--border-color); border-radius: var(--border-radius-lg); padding: var(--space-5); }
        .normal-controls .ctrl-item { flex: 1; min-width: 150px; }
        .normal-controls label { display: block; font-size: var(--text-sm); font-weight: 500; margin-bottom: var(--space-1); }
        .normal-controls .val { font-family: var(--font-mono); color: var(--color-math); font-weight: 700; }
        .normal-controls input[type="range"] { width: 100%; accent-color: var(--color-math); }
        .normal-chart { background: var(--bg-surface); border: 1px solid var(--border-color); border-radius: var(--border-radius-lg); overflow: hidden; margin-bottom: var(--space-8); }
        .normal-chart canvas { display: block; width: 100%; height: 350px; }

        /* 測驗 (重用) */
        .quiz-section { background: var(--bg-surface); border: 1px solid var(--border-color); border-radius: var(--border-radius-lg); padding: var(--space-8); margin-bottom: var(--space-8); }
        .quiz-section h2 { font-family: var(--font-heading); font-size: var(--text-2xl); margin-bottom: var(--space-2); }
        .quiz-section > p { color: var(--text-secondary); margin-bottom: var(--space-6); }
        .quiz-question { background: var(--bg-color); border-radius: var(--border-radius-md); padding: var(--space-5); margin-bottom: var(--space-4); }
        .quiz-question__text { font-weight: 600; margin-bottom: var(--space-3); }
        .quiz-options { display: flex; flex-direction: column; gap: var(--space-2); }
        .quiz-option { display: flex; align-items: center; gap: var(--space-3); padding: var(--space-3) var(--space-4); background: var(--bg-surface); border: 1px solid var(--border-color); border-radius: var(--border-radius-md); cursor: pointer; font-size: var(--text-sm); transition: all var(--transition-fast); }
        .quiz-option:hover { border-color: var(--color-math); background: var(--color-math-light); }
        .quiz-option.correct { border-color: var(--color-success); background: var(--color-success-light); }
        .quiz-option.wrong { border-color: var(--color-danger); background: var(--color-danger-light); }
        .quiz-option input[type="radio"] { accent-color: var(--color-math); }
        .quiz-submit { margin-top: var(--space-4); padding: var(--space-3) var(--space-6); background: var(--color-math); color: white; border: none; border-radius: var(--border-radius-md); font-size: var(--text-sm); font-weight: 600; cursor: pointer; font-family: var(--font-body); }
        .quiz-result { margin-top: var(--space-4); padding: var(--space-4); border-radius: var(--border-radius-md); font-weight: 600; text-align: center; display: none; }
        .quiz-result.show { display: block; }
        .quiz-result.pass { background: var(--color-success-light); color: #2e7d32; }
        .quiz-result.fail { background: var(--color-danger-light); color: #c62828; }
        .sim-footer { text-align: center; padding: var(--space-6); border-top: 1px solid var(--border-color); color: var(--text-tertiary); font-size: var(--text-sm); }
    </style>
</head>
<body>
    <div class="page-container">
        <a href="../courses.html" class="back-link">← 返回課程列表</a>

        <section class="sim-hero">
            <div class="sim-hero__badge">🎲 數學互動實驗室</div>
            <h1>統計與機率模擬</h1>
            <p>透過骰子模擬體驗大數法則，探索常態分佈的奧秘</p>
        </section>

        <!-- 模式切換 -->
        <div class="mode-tabs">
            <button class="mode-tab active" onclick="switchMode('dice')">🎲 骰子模擬</button>
            <button class="mode-tab" onclick="switchMode('normal')">📊 常態分佈</button>
        </div>

        <!-- 骰子模擬面板 -->
        <div class="sim-panel active" id="panel-dice">
            <div class="dice-area">
                <div class="dice-visual">
                    <h3 style="margin-bottom: var(--space-2);">擲骰子</h3>
                    <div class="dice-display" id="diceEmoji">🎲</div>
                    <p style="font-family: var(--font-mono); font-size: var(--text-2xl); color: var(--color-math); font-weight: 700;" id="diceNumber">—</p>
                    <div class="dice-btn-row">
                        <button class="dice-btn dice-btn--primary" onclick="rollDice(1)">擲 1 次</button>
                        <button class="dice-btn dice-btn--primary" onclick="rollDice(10)">擲 10 次</button>
                        <button class="dice-btn dice-btn--primary" onclick="rollDice(100)">擲 100 次</button>
                        <button class="dice-btn dice-btn--primary" onclick="rollDice(1000)">擲 1000 次</button>
                        <button class="dice-btn dice-btn--secondary" onclick="resetDice()">重置</button>
                    </div>
                </div>
                <div class="dice-chart">
                    <canvas id="diceChart"></canvas>
                </div>
            </div>

            <div class="stats-row" id="diceStats">
                <div class="stat-card"><div class="stat-card__label">總投擲次數</div><div class="stat-card__value" id="sTotalRolls">0</div></div>
                <div class="stat-card"><div class="stat-card__label">平均值</div><div class="stat-card__value" id="sMean">—</div></div>
                <div class="stat-card"><div class="stat-card__label">理論平均</div><div class="stat-card__value" id="sTheoMean">3.5</div></div>
                <div class="stat-card"><div class="stat-card__label">標準差</div><div class="stat-card__value" id="sStdDev">—</div></div>
                <div class="stat-card"><div class="stat-card__label">眾數</div><div class="stat-card__value" id="sMode">—</div></div>
                <div class="stat-card"><div class="stat-card__label">理論機率 (1/6)</div><div class="stat-card__value" id="sTheoPct">16.7%</div></div>
            </div>
        </div>

        <!-- 常態分佈面板 -->
        <div class="sim-panel" id="panel-normal">
            <div class="normal-controls">
                <div class="ctrl-item">
                    <label>平均值 μ：<span class="val" id="muVal">0</span></label>
                    <input type="range" id="muSlider" min="-5" max="5" step="0.1" value="0">
                </div>
                <div class="ctrl-item">
                    <label>標準差 σ：<span class="val" id="sigmaVal">1.0</span></label>
                    <input type="range" id="sigmaSlider" min="0.3" max="3" step="0.1" value="1">
                </div>
                <div class="ctrl-item">
                    <label>著色範圍：<span class="val" id="rangeVal">μ ± 1σ</span></label>
                    <input type="range" id="rangeSlider" min="1" max="3" step="1" value="1">
                </div>
            </div>
            <div class="normal-chart">
                <canvas id="normalCanvas"></canvas>
            </div>
            <div class="stats-row">
                <div class="stat-card"><div class="stat-card__label">著色範圍面積</div><div class="stat-card__value" id="nArea">68.27%</div></div>
                <div class="stat-card"><div class="stat-card__label">μ ± 1σ</div><div class="stat-card__value">68.27%</div></div>
                <div class="stat-card"><div class="stat-card__label">μ ± 2σ</div><div class="stat-card__value">95.45%</div></div>
                <div class="stat-card"><div class="stat-card__label">μ ± 3σ</div><div class="stat-card__value">99.73%</div></div>
            </div>
        </div>

        <!-- 測驗 -->
        <section class="quiz-section">
            <h2>📝 隨堂測驗</h2>
            <p>測試你對統計與機率的理解！</p>
            <div id="quizContainer"></div>
            <button class="quiz-submit" onclick="submitQuiz()">提交答案</button>
            <div class="quiz-result" id="quizResult"></div>
        </section>

        <footer class="sim-footer"><p>&copy; 2025 數學互動實驗室 · 教學資源網</p></footer>
    </div>

    <script src="../nav-global.js"></script>
    <script>
        // === 模式切換 ===
        function switchMode(mode) {
            document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.sim-panel').forEach(p => p.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('panel-' + mode).classList.add('active');
            if (mode === 'normal') drawNormal();
            if (mode === 'dice') drawDiceChart();
        }

        // ==================== 骰子模擬 ====================
        const DICE_FACES = ['', '⚀', '⚁', '⚂', '⚃', '⚄', '⚅'];
        let counts = [0, 0, 0, 0, 0, 0, 0]; // index 0 unused
        let allRolls = [];

        function rollDice(n) {
            const display = document.getElementById('diceEmoji');
            const numDisplay = document.getElementById('diceNumber');
            display.classList.add('rolling');

            for (let i = 0; i < n; i++) {
                const val = Math.floor(Math.random() * 6) + 1;
                counts[val]++;
                allRolls.push(val);
            }

            // 顯示最後一次的結果
            const last = allRolls[allRolls.length - 1];
            setTimeout(() => {
                display.classList.remove('rolling');
                display.textContent = DICE_FACES[last];
                numDisplay.textContent = last;
            }, n > 1 ? 300 : 200);

            updateDiceStats();
            drawDiceChart();
        }

        function resetDice() {
            counts = [0, 0, 0, 0, 0, 0, 0];
            allRolls = [];
            document.getElementById('diceEmoji').textContent = '🎲';
            document.getElementById('diceNumber').textContent = '—';
            updateDiceStats();
            drawDiceChart();
        }

        function updateDiceStats() {
            const total = allRolls.length;
            document.getElementById('sTotalRolls').textContent = total.toLocaleString();

            if (total === 0) {
                document.getElementById('sMean').textContent = '—';
                document.getElementById('sStdDev').textContent = '—';
                document.getElementById('sMode').textContent = '—';
                return;
            }

            const sum = allRolls.reduce((a, b) => a + b, 0);
            const mean = sum / total;
            document.getElementById('sMean').textContent = mean.toFixed(3);

            const variance = allRolls.reduce((s, v) => s + Math.pow(v - mean, 2), 0) / total;
            document.getElementById('sStdDev').textContent = Math.sqrt(variance).toFixed(3);

            let maxCount = 0, mode = 0;
            for (let i = 1; i <= 6; i++) { if (counts[i] > maxCount) { maxCount = counts[i]; mode = i; } }
            document.getElementById('sMode').textContent = mode;
        }

        function drawDiceChart() {
            const canvas = document.getElementById('diceChart');
            const dpr = window.devicePixelRatio || 1;
            const rect = canvas.parentElement.getBoundingClientRect();
            canvas.style.width = rect.width + 'px';
            canvas.style.height = '300px';
            canvas.width = rect.width * dpr;
            canvas.height = 300 * dpr;
            const ctx = canvas.getContext('2d');
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

            const w = rect.width, h = 300;
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            ctx.fillStyle = isDark ? '#1e293b' : '#fafafa';
            ctx.fillRect(0, 0, w, h);

            const total = allRolls.length || 1;
            const maxC = Math.max(...counts.slice(1), 1);
            const barW = (w - 80) / 6;
            const barArea = h - 60;
            const colors = ['', '#e74c3c', '#f39c12', '#2ecc71', '#3498db', '#9b59b6', '#e91e63'];

            for (let i = 1; i <= 6; i++) {
                const x = 40 + (i - 1) * barW;
                const barH = (counts[i] / maxC) * barArea * 0.85;

                // 長條
                ctx.fillStyle = colors[i];
                ctx.globalAlpha = 0.8;
                ctx.beginPath();
                ctx.roundRect(x + 4, h - 30 - barH, barW - 8, barH, [6, 6, 0, 0]);
                ctx.fill();
                ctx.globalAlpha = 1;

                // 數字標籤
                ctx.fillStyle = isDark ? '#ccc' : '#333';
                ctx.font = 'bold 13px JetBrains Mono'; ctx.textAlign = 'center';
                ctx.fillText(DICE_FACES[i], x + barW / 2, h - 10);

                // 次數
                if (counts[i] > 0) {
                    ctx.fillStyle = isDark ? '#eee' : '#333';
                    ctx.font = '11px JetBrains Mono';
                    ctx.fillText(counts[i], x + barW / 2, h - 35 - barH);

                    // 百分比
                    ctx.fillStyle = isDark ? '#999' : '#888';
                    ctx.font = '10px Noto Sans TC';
                    ctx.fillText((counts[i] / total * 100).toFixed(1) + '%', x + barW / 2, h - 50 - barH);
                }
            }

            // 理論值虛線
            if (allRolls.length > 0) {
                const theoH = (total / 6 / maxC) * barArea * 0.85;
                ctx.setLineDash([5, 5]);
                ctx.strokeStyle = isDark ? 'rgba(255,255,255,0.3)' : 'rgba(0,0,0,0.2)';
                ctx.lineWidth = 1.5;
                ctx.beginPath(); ctx.moveTo(40, h - 30 - theoH); ctx.lineTo(w - 10, h - 30 - theoH); ctx.stroke();
                ctx.setLineDash([]);
                ctx.fillStyle = isDark ? '#aaa' : '#888';
                ctx.font = '10px Noto Sans TC'; ctx.textAlign = 'right';
                ctx.fillText('理論值 (1/6)', w - 15, h - 33 - theoH);
            }
        }

        // ==================== 常態分佈 ====================
        function normalPDF(x, mu, sigma) {
            return (1 / (sigma * Math.sqrt(2 * Math.PI))) * Math.exp(-0.5 * Math.pow((x - mu) / sigma, 2));
        }

        function drawNormal() {
            const mu = parseFloat(document.getElementById('muSlider').value);
            const sigma = parseFloat(document.getElementById('sigmaSlider').value);
            const range = parseInt(document.getElementById('rangeSlider').value);

            document.getElementById('muVal').textContent = mu.toFixed(1);
            document.getElementById('sigmaVal').textContent = sigma.toFixed(1);
            document.getElementById('rangeVal').textContent = `μ ± ${range}σ`;

            const areaMap = { 1: '68.27%', 2: '95.45%', 3: '99.73%' };
            document.getElementById('nArea').textContent = areaMap[range];

            const canvas = document.getElementById('normalCanvas');
            const dpr = window.devicePixelRatio || 1;
            const rect = canvas.parentElement.getBoundingClientRect();
            canvas.style.width = rect.width + 'px';
            canvas.style.height = '350px';
            canvas.width = rect.width * dpr;
            canvas.height = 350 * dpr;
            const ctx = canvas.getContext('2d');
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

            const w = rect.width, h = 350;
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            ctx.fillStyle = isDark ? '#1e293b' : '#fafafa';
            ctx.fillRect(0, 0, w, h);

            const margin = 60;
            const plotW = w - margin * 2;
            const plotH = h - margin * 2;
            const xMin = mu - 4 * sigma;
            const xMax = mu + 4 * sigma;
            const yMax = normalPDF(mu, mu, sigma) * 1.15;

            function toPixelX(x) { return margin + (x - xMin) / (xMax - xMin) * plotW; }
            function toPixelY(y) { return h - margin - (y / yMax) * plotH; }

            // 座標軸
            ctx.strokeStyle = isDark ? 'rgba(255,255,255,0.2)' : 'rgba(0,0,0,0.15)';
            ctx.lineWidth = 1;
            ctx.beginPath(); ctx.moveTo(margin, h - margin); ctx.lineTo(w - margin, h - margin); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(margin, margin); ctx.lineTo(margin, h - margin); ctx.stroke();

            // 著色區域
            const lo = mu - range * sigma;
            const hi = mu + range * sigma;
            ctx.beginPath();
            ctx.moveTo(toPixelX(lo), toPixelY(0));
            for (let x = lo; x <= hi; x += 0.02) {
                ctx.lineTo(toPixelX(x), toPixelY(normalPDF(x, mu, sigma)));
            }
            ctx.lineTo(toPixelX(hi), toPixelY(0));
            ctx.closePath();
            ctx.fillStyle = isDark ? 'rgba(155,89,182,0.25)' : 'rgba(155,89,182,0.15)';
            ctx.fill();

            // 曲線
            ctx.beginPath();
            ctx.strokeStyle = '#9b59b6';
            ctx.lineWidth = 3;
            for (let px = margin; px <= w - margin; px++) {
                const x = xMin + (px - margin) / plotW * (xMax - xMin);
                const y = normalPDF(x, mu, sigma);
                if (px === margin) ctx.moveTo(px, toPixelY(y));
                else ctx.lineTo(px, toPixelY(y));
            }
            ctx.stroke();

            // μ 標線
            ctx.setLineDash([5, 5]);
            ctx.strokeStyle = '#e74c3c';
            ctx.lineWidth = 1.5;
            const muPx = toPixelX(mu);
            ctx.beginPath(); ctx.moveTo(muPx, margin); ctx.lineTo(muPx, h - margin); ctx.stroke();
            ctx.setLineDash([]);

            // σ 邊界標線
            ctx.setLineDash([3, 3]);
            ctx.strokeStyle = isDark ? 'rgba(255,255,255,0.2)' : 'rgba(0,0,0,0.15)';
            for (let i = -3; i <= 3; i++) {
                if (i === 0) continue;
                const xp = toPixelX(mu + i * sigma);
                ctx.beginPath(); ctx.moveTo(xp, margin); ctx.lineTo(xp, h - margin); ctx.stroke();
            }
            ctx.setLineDash([]);

            // X 軸標記
            ctx.fillStyle = isDark ? '#aaa' : '#666';
            ctx.font = '11px JetBrains Mono'; ctx.textAlign = 'center';
            for (let i = -3; i <= 3; i++) {
                const xp = toPixelX(mu + i * sigma);
                const label = i === 0 ? 'μ' : `μ${i > 0 ? '+' : ''}${i}σ`;
                ctx.fillText(label, xp, h - margin + 20);
            }
        }

        // 事件
        ['muSlider', 'sigmaSlider', 'rangeSlider'].forEach(id => {
            document.getElementById(id).addEventListener('input', drawNormal);
        });

        window.addEventListener('resize', () => { drawDiceChart(); drawNormal(); });
        new MutationObserver(() => { drawDiceChart(); drawNormal(); }).observe(document.documentElement, { attributes: true, attributeFilter: ['data-theme'] });

        // === 測驗 ===
        const QUIZ_DATA = [
            { q: '擲一顆公正骰子，出現 3 的機率是多少？', options: ['1/3', '1/6', '1/2', '1/12'], answer: 1 },
            { q: '大數法則表示隨著試驗次數增加，實驗結果會趨近於？', options: ['最大值', '最小值', '理論期望值', '中位數'], answer: 2 },
            { q: '常態分佈中，μ ± 1σ 的面積約為？', options: ['50%', '68%', '95%', '99%'], answer: 1 },
            { q: '標準差越大，常態分佈曲線會？', options: ['越高越窄', '越矮越寬', '向右移', '向左移'], answer: 1 },
            { q: '常態分佈中，μ ± 2σ 涵蓋了多少百分比的資料？', options: ['68.27%', '90%', '95.45%', '99.73%'], answer: 2 }
        ];

        function buildQuiz() {
            document.getElementById('quizContainer').innerHTML = QUIZ_DATA.map((item, qi) => `
                <div class="quiz-question"><div class="quiz-question__text">${qi+1}. ${item.q}</div>
                <div class="quiz-options">${item.options.map((opt, oi) => `
                    <label class="quiz-option" data-qi="${qi}" data-oi="${oi}"><input type="radio" name="q${qi}" value="${oi}"> ${opt}</label>`).join('')}
                </div></div>`).join('');
        }

        function submitQuiz() {
            let correct = 0;
            QUIZ_DATA.forEach((item, qi) => {
                const sel = document.querySelector(`input[name="q${qi}"]:checked`);
                document.querySelectorAll(`.quiz-option[data-qi="${qi}"]`).forEach(opt => {
                    opt.classList.remove('correct', 'wrong');
                    const oi = parseInt(opt.dataset.oi);
                    if (oi === item.answer) opt.classList.add('correct');
                    else if (sel && parseInt(sel.value) === oi) opt.classList.add('wrong');
                });
                if (sel && parseInt(sel.value) === item.answer) correct++;
            });
            const score = Math.round((correct / QUIZ_DATA.length) * 100);
            const r = document.getElementById('quizResult');
            r.classList.add('show'); r.classList.remove('pass', 'fail');
            r.classList.add(score >= 60 ? 'pass' : 'fail');
            r.textContent = score >= 60 ? `🎉 得分 ${score} 分！答對 ${correct}/${QUIZ_DATA.length} 題！` : `😢 得分 ${score} 分！答對 ${correct}/${QUIZ_DATA.length} 題`;
            const progress = JSON.parse(localStorage.getItem('teach-progress') || '{}');
            progress['math-statistics'] = { score, date: new Date().toISOString(), total: QUIZ_DATA.length, correct };
            localStorage.setItem('teach-progress', JSON.stringify(progress));
        }

        // 初始化
        drawDiceChart();
        drawNormal();
        buildQuiz();
    </script>
</body>
</html>
