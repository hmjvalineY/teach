<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>複利試算工具 - Stitch</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Verdana, sans-serif; background: #eef2f3; margin: 0; display: flex; justify-content: center; padding: 40px;}
        .calculator { background: white; width: 900px; max-width: 100%; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); display: flex; overflow: hidden;}
        .inputs { background: #2c3e50; color: white; padding: 40px; width: 300px;}
        .inputs h2 { margin-top: 0; color: #18bc9c;}
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 5px; font-size: 0.9rem;}
        input { width: 100%; padding: 10px; border: none; border-radius: 5px; box-sizing: border-box; font-size: 1.1rem; }
        button { width: 100%; background: #18bc9c; color: white; border: none; padding: 15px; border-radius: 5px; font-size: 1.1rem; cursor: pointer; font-weight: bold; margin-top: 10px;}
        button:hover { background: #128f76; }
        .results { flex-grow: 1; padding: 40px; background: white;}
        .chart { display: flex; align-items: flex-end; height: 300px; gap: 5px; margin-top: 30px; border-bottom: 2px solid #ccc; padding-bottom: 1px;}
        .bar-col { flex: 1; display: flex; flex-direction: column; justify-content: flex-end; align-items: center; position: relative;}
        .bar { width: 100%; background: #18bc9c; border-radius: 3px 3px 0 0; transition: height 0.5s;}
        .bar-label { margin-top: 10px; font-size: 0.8rem; color: #7f8c8d; }
        .amt-label { position: absolute; top: -20px; font-size: 0.7rem; color: #333; font-weight: bold; white-space: nowrap; transform: rotate(-45deg);}
    </style>
</head>
<body>
    <div class="calculator">
        <div class="inputs">
            <a href="../index.html" style="color: #ccc; text-decoration: none;">← 返回</a>
            <h2 style="margin-top: 20px;">複利試算 💰</h2>
            
            <div class="form-group">
                <label>本金 (元)</label>
                <input type="number" id="p" value="100000">
            </div>
            <div class="form-group">
                <label>年利率 (%)</label>
                <input type="number" id="r" value="5">
            </div>
            <div class="form-group">
                <label>投資年限</label>
                <input type="number" id="t" value="10">
            </div>
            <button onclick="calculate()">計算並繪圖</button>
        </div>
        
        <div class="results">
            <h3>資產成長預測 (本金 + 複利)</h3>
            <h1 id="finalAmount" style="color: #2c3e50; font-size: 2.5rem; margin: 0;">$0</h1>
            
            <div class="chart" id="chartArea">
                <!-- Bars will be injected here -->
            </div>
        </div>
    </div>

    <script>
        function calculate() {
            const P = parseFloat(document.getElementById('p').value);
            const R = parseFloat(document.getElementById('r').value) / 100;
            const T = parseInt(document.getElementById('t').value);
            
            const chartArea = document.getElementById('chartArea');
            chartArea.innerHTML = '';
            
            const finalAmount = P * Math.pow(1 + R, T);
            document.getElementById('finalAmount').innerText = '$' + Math.floor(finalAmount).toLocaleString();
            
            // Generate bars
            for(let i = 1; i <= T; i++) {
                const amount = P * Math.pow(1 + R, i);
                const heightPercent = (amount / finalAmount) * 100;
                
                // Show label conditionally to avoid crowding
                let amtLabel = '';
                if(T <= 15 || i === T || i === 1) {
                    amtLabel = `<div class="amt-label">${Math.floor(amount/1000)}k</div>`;
                }

                const col = `
                    <div class="bar-col">
                        ${amtLabel}
                        <div class="bar" style="height: ${heightPercent}%"></div>
                        <div class="bar-label">Y${i}</div>
                    </div>
                `;
                chartArea.innerHTML += col;
            }
        }
        
        calculate(); // init
    </script>
</body>
</html>
