<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>選戰社群聲量監測 - Stitch & Jules</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #121212; color: #fff; margin: 0; padding: 20px;}
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 20px;}
        header a { color: #bb86fc; text-decoration: none; border: 1px solid #bb86fc; padding: 5px 15px; border-radius: 20px;}
        .grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-top: 20px;}
        .panel { background: #1e1e1e; padding: 20px; border-radius: 8px; border: 1px solid #333;}
        .panel h3 { margin-top: 0; color: #bb86fc;}
        
        .line-chart { width: 100%; height: 200px; background: repeating-linear-gradient(0deg, #333, #333 1px, transparent 1px, transparent 40px); position: relative; margin-top: 20px;}
        .line A { position: absolute; border-top: 3px solid #cf6679; width: 100%; top: 40%; transform: rotate(-5deg); transform-origin: left;}
        .line B { position: absolute; border-top: 3px solid #03dac6; width: 100%; top: 70%; transform: rotate(15deg); transform-origin: left;}
        
        .tweet { background: #2c2c2c; padding: 15px; border-radius: 8px; margin-bottom: 10px; font-size: 0.9rem;}
        .sentiment-badge { float: right; padding: 3px 8px; border-radius: 10px; font-size: 0.8rem; font-weight: bold;}
        .positive { background: rgba(3, 218, 198, 0.2); color: #03dac6;}
        .negative { background: rgba(207, 102, 121, 0.2); color: #cf6679;}
        
        .jules-info { background: rgba(187, 134, 252, 0.1); border-left: 4px solid #bb86fc; padding: 15px; margin-top: 20px;}
    </style>
</head>
<body>
    <header>
        <h1 style="margin: 0;">2026 校園自治會選舉：實時聲量雷達</h1>
        <a href="../index.html">← 返回首頁</a>
    </header>

    <div class="jules-info">
        <strong>⚙️ 技術架構說明：</strong><br>
        學生原本面對海量社群留言束手無策，Jules 協助清洗資料（過濾無意義符號）、呼叫大語言模型判定情緒，最後 Stitch 生成了這個宛如戰情室的高科技暗黑風格儀表板。
    </div>

    <div class="grid">
        <div class="panel">
            <h3>候選人討論熱度趨勢 (近 7 日)</h3>
            <div style="display: flex; gap: 20px; margin-bottom: 10px; font-size: 0.9rem;">
                <span style="color: #cf6679;">■ 一號候選人 (改革派)</span>
                <span style="color: #03dac6;">■ 二號候選人 (延續派)</span>
            </div>
            <div class="line-chart">
                <!-- SVG would be better, but CSS lines mock it -->
                <svg width="100%" height="100%">
                    <polyline points="0,150 100,140 200,80 300,50 400,60 500,40 600,20" fill="none" stroke="#cf6679" stroke-width="3"/>
                    <polyline points="0,180 100,170 200,160 300,120 400,150 500,130 600,100" fill="none" stroke="#03dac6" stroke-width="3"/>
                </svg>
            </div>
        </div>
        
        <div class="panel">
            <h3>即時輿情抽樣</h3>
            <div class="tweet">
                "一號的政見超級有料！支持午餐開放外食！"
                <span class="sentiment-badge positive">極度正面 (98%)</span>
            </div>
            <div class="tweet">
                "二號感覺都在打高空，沒什麼具體方案。"
                <span class="sentiment-badge negative">負面 (-75%)</span>
            </div>
            <div class="tweet">
                "希望辯論會能有直播可以看"
                <span class="sentiment-badge" style="background:#555; color:#ccc">中立 (0%)</span>
            </div>
        </div>
    </div>
</body>
</html>
