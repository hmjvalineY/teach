            background: var(--bg-color);
            border-radius: var(--border-radius-full);
            color: var(--text-secondary);

            align-items: center;
            gap: 4px;
            font-size: var(--text-xs);
            color: var(--color-accent);
            font-weight: 500;
            margin-left: auto;
            text-decoration: none;
