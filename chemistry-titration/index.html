<body>
    <div class="page-container">

        <section class="sim-hero">
            <div class="sim-hero__badge">🧪 化學互動實驗室</div>
            <h1>酸鹼滴定模擬</h1>
            <p>進行虛擬滴定實驗，觀察 pH 值即時變化與指示劑顏色反應</p>
        </section>

        <div class="tit-layout">
            <!-- 燒瓶視覺 -->
            <div class="flask-panel">
                <h3 style="margin-bottom: 0;">錐形瓶</h3>
                <div class="flask-container">
                    <div class="flask-neck">
                        <div class="flask-drop" id="drop"></div>
                    </div>
                    <div class="flask-body">
                        <div class="flask-liquid" id="liquid" style="height: 60%; background: #e74c3c;"></div>
                    </div>
                </div>
                <div class="ph-label">目前 pH 值</div>
                <div class="ph-display" id="phDisplay" style="color: #e74c3c;">1.00</div>
                <div class="ph-label" id="indicatorStatus">酚酞指示劑：無色</div>

            <!-- 控制面板 -->
            <div class="ctrl-panel">
                <h3>⚙️ 實驗設定</h3>

                <div class="ctrl-group">
                    <label><span>被滴定物（酸）</span></label>
                    <select id="acidSelect">
                        <option value="strong">強酸 (HCl) — 0.1 M, 25 mL</option>
                        <option value="weak">弱酸 (CH₃COOH) — 0.1 M, 25 mL</option>
                    </select>
                </div>

                <div class="ctrl-group">
                    <label><span>滴定液（鹼）</span></label>
                    <select id="baseSelect">
                        <option value="strong">強鹼 (NaOH) — 0.1 M</option>
                    </select>
                </div>

                <div class="ctrl-group">
                    <label><span>滴定速度</span><span class="val" id="speedVal">1.0 mL/次</span></label>
                    <input type="range" id="speedSlider" min="0.1" max="2" step="0.1" value="1">
                    <div class="ctrl-desc">每次點擊「滴入」加入的鹼液體積</div>
                </div>

                <div class="ctrl-group">
                    <label><span>已加入鹼液</span><span class="val" id="addedVal">0.0 mL</span></label>
                </div>

                <div class="btn-row">
                    <button class="btn-tit btn-tit--primary" onclick="addDrop()">💧 滴入</button>
                    <button class="btn-tit btn-tit--primary" onclick="autoTitrate()">▶️ 自動滴定</button>
                    <button class="btn-tit btn-tit--secondary" onclick="resetTitration()">🔄 重置</button>
                </div>
            </div>
        </div>

        <!-- pH 曲線 -->

            <canvas id="phChart"></canvas>
        </div>

        <!-- 統計 -->
        <div class="stats-row">
            <div class="stat-card"><div class="stat-card__label">當量點 pH</div><div class="stat-card__value" id="sEqPH">—</div></div>
            <div class="stat-card"><div class="stat-card__label">當量點體積</div><div class="stat-card__value" id="sEqVol">25.0 mL</div></div>
            <div class="stat-card"><div class="stat-card__label">初始 pH</div><div class="stat-card__value" id="sInitPH">1.00</div></div>
            <div class="stat-card"><div class="stat-card__label">資料點數</div><div class="stat-card__value" id="sPoints">1</div></div>
        </div>

        <!-- 測驗 -->

            <h2>📝 隨堂測驗</h2>
            <p>測試你對酸鹼滴定的理解！</p>
            <div id="quizContainer"></div>
            <button class="quiz-submit" onclick="submitQuiz()">提交答案</button>
            <div class="quiz-result" id="quizResult"></div>

    <script src="../nav-global.js"></script>
    <script>
        // === 滴定參數 ===
        const Ca = 0.1, Va = 25; // 酸濃度、體積
        const Cb = 0.1;          // 鹼濃度
        let Vb = 0;              // 已加入鹼液體積
        let dataPoints = [[0, null]]; // [Vb, pH]
        let autoInterval = null;

        // === pH 計算 ===
        function calcPH(vb) {
            const acidType = document.getElementById('acidSelect').value;
            const molesAcid = Ca * Va / 1000;
            const molesBase = Cb * vb / 1000;
            const totalVol = (Va + vb) / 1000;

            if (acidType === 'strong') {
                // 強酸 + 強鹼
                if (molesBase < molesAcid - 1e-10) {
                    // 酸過量
                    const excessH = (molesAcid - molesBase) / totalVol;
                    return -Math.log10(excessH);
                } else if (Math.abs(molesBase - molesAcid) < 1e-10) {
                    return 7.0; // 當量點
                } else {
                    // 鹼過量
                    const excessOH = (molesBase - molesAcid) / totalVol;
                    const pOH = -Math.log10(excessOH);
                    return 14 - pOH;
                }
            } else {
                // 弱酸 + 強鹼 (Ka = 1.8e-5，醋酸)
                const Ka = 1.8e-5;
                if (molesBase < molesAcid - 1e-10) {
                    // 緩衝區
                    const remaining = molesAcid - molesBase;
                    if (molesBase < 1e-10) {
                        // 純弱酸
                        const H = Math.sqrt(Ka * Ca);
                        return -Math.log10(H);
                    }
                    // Henderson-Hasselbalch
                    return -Math.log10(Ka) + Math.log10(molesBase / remaining);
                } else if (Math.abs(molesBase - molesAcid) < 1e-10) {
                    // 當量點：弱酸鹽水解
                    const Csalt = molesAcid / totalVol;
                    const Kb = 1e-14 / Ka;
                    const OH = Math.sqrt(Kb * Csalt);
                    return 14 + Math.log10(OH);
                } else {
                    const excessOH = (molesBase - molesAcid) / totalVol;
                    return 14 + Math.log10(excessOH);
                }
            }
        }

        // === pH → 顏色 ===
        function phToColor(ph) {
            if (ph < 3) return 'hsl(0, 80%, 55%)';      // 紅
            if (ph < 5) return 'hsl(25, 90%, 55%)';     // 橘
            if (ph < 6) return 'hsl(45, 90%, 55%)';     // 黃
            if (ph < 7) return 'hsl(80, 70%, 50%)';     // 黃綠
            if (ph < 8) return 'hsl(120, 50%, 50%)';    // 綠
            if (ph < 9) return 'hsl(180, 60%, 50%)';    // 青
            if (ph < 11) return 'hsl(220, 60%, 55%)';   // 藍
            return 'hsl(270, 60%, 55%)';                 // 紫
        }

        // === 更新顯示 ===
        function update(animate) {
            const ph = calcPH(Vb);
            const color = phToColor(ph);

            document.getElementById('phDisplay').textContent = ph.toFixed(2);
            document.getElementById('phDisplay').style.color = color;
            document.getElementById('liquid').style.backgroundColor = color;
            document.getElementById('addedVal').textContent = Vb.toFixed(1) + ' mL';

            // 酚酞指示劑狀態
            const indicator = ph >= 8.2 ? '粉紅色 🩷' : '無色 ⚪';
            document.getElementById('indicatorStatus').textContent = '酚酞指示劑：' + indicator;

            // 統計
            const eqVol = Ca * Va / Cb;
            const eqPH = document.getElementById('acidSelect').value === 'strong' ? '7.00' : '8.72';
            document.getElementById('sEqPH').textContent = eqPH;
            document.getElementById('sEqVol').textContent = eqVol.toFixed(1) + ' mL';
            document.getElementById('sInitPH').textContent = calcPH(0).toFixed(2);
            document.getElementById('sPoints').textContent = dataPoints.length;

            // 動畫水滴
            if (animate) {
                const drop = document.getElementById('drop');
                drop.classList.remove('dropping');
                void drop.offsetWidth;
                drop.classList.add('dropping');
            }

            drawChart();
        }

        // === 滴入 ===
        function addDrop() {
            const speed = parseFloat(document.getElementById('speedSlider').value);
            document.getElementById('speedVal').textContent = speed.toFixed(1) + ' mL/次';
            if (Vb >= 50) return; // 最大 50 mL
            Vb += speed;
            if (Vb > 50) Vb = 50;
            dataPoints.push([Vb, calcPH(Vb)]);
            update(true);
        }

        // === 自動滴定 ===
        function autoTitrate() {
            if (autoInterval) { clearInterval(autoInterval); autoInterval = null; return; }
            autoInterval = setInterval(() => {
                if (Vb >= 50) { clearInterval(autoInterval); autoInterval = null; return; }
                addDrop();
            }, 200);
        }

        // === 重置 ===
        function resetTitration() {
            if (autoInterval) { clearInterval(autoInterval); autoInterval = null; }
            Vb = 0;
            dataPoints = [[0, calcPH(0)]];
            update(false);
        }

        // === 繪製 pH 曲線 ===
        function drawChart() {
            const canvas = document.getElementById('phChart');
            const dpr = window.devicePixelRatio || 1;
            const rect = canvas.parentElement.getBoundingClientRect();
            canvas.style.width = rect.width + 'px';
            canvas.style.height = '350px';
            canvas.width = rect.width * dpr;
            canvas.height = 350 * dpr;
            const ctx = canvas.getContext('2d');
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

            const w = rect.width, h = 350;
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            ctx.fillStyle = isDark ? '#1e293b' : '#fafafa';
            ctx.fillRect(0, 0, w, h);

            const margin = { top: 30, right: 30, bottom: 50, left: 60 };
            const plotW = w - margin.left - margin.right;
            const plotH = h - margin.top - margin.bottom;

            function toX(v) { return margin.left + (v / 50) * plotW; }
            function toY(ph) { return margin.top + ((14 - ph) / 14) * plotH; }

            // 格線
            ctx.strokeStyle = isDark ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.06)';
            ctx.lineWidth = 1;
            for (let ph = 0; ph <= 14; ph += 2) {
                const y = toY(ph);
                ctx.beginPath(); ctx.moveTo(margin.left, y); ctx.lineTo(w - margin.right, y); ctx.stroke();
                ctx.fillStyle = isDark ? '#888' : '#888';
                ctx.font = '11px JetBrains Mono'; ctx.textAlign = 'right';
                ctx.fillText(ph, margin.left - 8, y + 4);
            }
            for (let v = 0; v <= 50; v += 10) {
                const x = toX(v);
                ctx.beginPath(); ctx.moveTo(x, margin.top); ctx.lineTo(x, h - margin.bottom); ctx.stroke();
                ctx.fillStyle = isDark ? '#888' : '#888';
                ctx.font = '11px JetBrains Mono'; ctx.textAlign = 'center';
                ctx.fillText(v, x, h - margin.bottom + 20);
            }

            // 軸標籤
            ctx.fillStyle = isDark ? '#aaa' : '#666';
            ctx.font = '13px Noto Sans TC'; ctx.textAlign = 'center';
            ctx.fillText('加入鹼液體積 (mL)', w / 2, h - 8);
            ctx.save(); ctx.translate(15, h / 2); ctx.rotate(-Math.PI / 2);
            ctx.fillText('pH 值', 0, 0); ctx.restore();

            // pH = 7 標線
            ctx.setLineDash([5, 5]);
            ctx.strokeStyle = isDark ? 'rgba(255,255,255,0.2)' : 'rgba(0,0,0,0.15)';
            ctx.lineWidth = 1.5;
            ctx.beginPath(); ctx.moveTo(margin.left, toY(7)); ctx.lineTo(w - margin.right, toY(7)); ctx.stroke();
            ctx.setLineDash([]);

            // 理論曲線（虛線）
            ctx.setLineDash([3, 3]);
            ctx.strokeStyle = isDark ? 'rgba(255,255,255,0.15)' : 'rgba(0,0,0,0.1)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            for (let v = 0; v <= 50; v += 0.2) {
                const ph = calcPH(v);
                const x = toX(v), y = toY(Math.max(0, Math.min(14, ph)));
                if (v === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
            }
            ctx.stroke();
            ctx.setLineDash([]);

            // 實驗數據點
            if (dataPoints.length > 1) {
                ctx.beginPath();
                ctx.strokeStyle = '#e65100';
                ctx.lineWidth = 2.5;
                dataPoints.forEach(([v, ph], i) => {
                    if (ph === null) return;
                    const x = toX(v), y = toY(Math.max(0, Math.min(14, ph)));
                    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
                });
                ctx.stroke();

                // 端點
                dataPoints.forEach(([v, ph]) => {
                    if (ph === null) return;
                    const x = toX(v), y = toY(Math.max(0, Math.min(14, ph)));
                    ctx.beginPath(); ctx.arc(x, y, 3, 0, Math.PI * 2);
                    ctx.fillStyle = '#e65100'; ctx.fill();
                });
            }

            // 當量點標記
            const eqVol = Ca * Va / Cb;
            const eqX = toX(eqVol);
            ctx.setLineDash([5, 5]);
            ctx.strokeStyle = '#e74c3c';
            ctx.lineWidth = 1.5;
            ctx.beginPath(); ctx.moveTo(eqX, margin.top); ctx.lineTo(eqX, h - margin.bottom); ctx.stroke();
            ctx.setLineDash([]);
            ctx.fillStyle = '#e74c3c';
            ctx.font = 'bold 11px Noto Sans TC'; ctx.textAlign = 'center';
            ctx.fillText('當量點', eqX, margin.top - 8);
        }

        // 事件
        document.getElementById('speedSlider').addEventListener('input', () => {
            document.getElementById('speedVal').textContent = parseFloat(document.getElementById('speedSlider').value).toFixed(1) + ' mL/次';
        });
        document.getElementById('acidSelect').addEventListener('change', resetTitration);
        window.addEventListener('resize', drawChart);
        new MutationObserver(drawChart).observe(document.documentElement, { attributes: true, attributeFilter: ['data-theme'] });

        // === 測驗 ===
        const QUIZ_DATA = [
            { q: '強酸 + 強鹼滴定的當量點 pH 值為？', options: ['1', '5', '7', '10'], answer: 2 },
            { q: '弱酸 + 強鹼滴定的當量點 pH 值會？', options: ['等於 7', '小於 7', '大於 7', '無法確定'], answer: 2 },
            { q: '酚酞指示劑在什麼 pH 範圍會變成粉紅色？', options: ['pH < 4', 'pH 4-7', 'pH 7-8', 'pH > 8.2'], answer: 3 },
            { q: '滴定曲線在當量點附近的特徵是？', options: ['平坦不變', 'pH 劇烈跳躍', 'pH 緩慢下降', 'pH 回到初始值'], answer: 1 },
            { q: '0.1M HCl 25mL 需要多少 0.1M NaOH 才能達到當量點？', options: ['12.5 mL', '25 mL', '50 mL', '100 mL'], answer: 1 }
        ];

        function buildQuiz() {
            document.getElementById('quizContainer').innerHTML = QUIZ_DATA.map((item, qi) => `
                <div class="quiz-question"><div class="quiz-question__text">${qi+1}. ${item.q}</div>
                <div class="quiz-options">${item.options.map((opt, oi) => `
                    <label class="quiz-option" data-qi="${qi}" data-oi="${oi}"><input type="radio" name="q${qi}" value="${oi}"> ${opt}</label>`).join('')}
                </div></div>`).join('');
        }

        function submitQuiz() {
            let correct = 0;
            QUIZ_DATA.forEach((item, qi) => {
                const sel = document.querySelector(`input[name="q${qi}"]:checked`);
                document.querySelectorAll(`.quiz-option[data-qi="${qi}"]`).forEach(opt => {
                    opt.classList.remove('correct', 'wrong');
                    const oi = parseInt(opt.dataset.oi);
                    if (oi === item.answer) opt.classList.add('correct');
                    else if (sel && parseInt(sel.value) === oi) opt.classList.add('wrong');
                });
                if (sel && parseInt(sel.value) === item.answer) correct++;
            });
            const score = Math.round((correct / QUIZ_DATA.length) * 100);
            const r = document.getElementById('quizResult');
            r.classList.add('show'); r.classList.remove('pass', 'fail');
            r.classList.add(score >= 60 ? 'pass' : 'fail');
            r.textContent = score >= 60 ? `🎉 得分 ${score} 分！答對 ${correct}/${QUIZ_DATA.length} 題！` : `😢 得分 ${score} 分！答對 ${correct}/${QUIZ_DATA.length} 題`;
            const progress = JSON.parse(localStorage.getItem('teach-progress') || '{}');
            progress['chemistry-titration'] = { score, date: new Date().toISOString(), total: QUIZ_DATA.length, correct };
            localStorage.setItem('teach-progress', JSON.stringify(progress));
        }

        // 初始化
        dataPoints = [[0, calcPH(0)]];
        update(false);
        buildQuiz();
    </script>
</body>
</html>
