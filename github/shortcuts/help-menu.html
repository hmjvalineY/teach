<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>魔法小抄</title>
    <link rel="stylesheet" href="../style-github.css">
</head>
<body>
<div class="container">
    <a href="../HowToUseGithub.html" class="btn-back">⬅ 返回主選單</a>
    <h1>魔法小抄（按下 <span class="key">?</span>）</h1>
    <div class="demo-box">
        <h2>🛠 實際操作示範</h2>
        <p>如果你忘記了上述提到的神偷快捷鍵，或者是想發現更多隱藏按鈕，這是最重要的招式。</p>
        <p>在 GitHub 的頁面上，按下 <span class="key">Shift</span> + <span class="key">/</span>（也就是輸入問號 <span class="key">?</span>）。</p>
        <p>此時螢幕中央會浮現一張官方製作的半透明「Keyboard Shortcuts」一覽表，列出在當前操作頁面下，所有能幫助你加速工作的熱鍵小抄！</p>
    </div>
</div>
</body>
</html>
