<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>透視眼搜尋</title>
    <link rel="stylesheet" href="../style-github.css">
</head>
<body>
<div class="container">
    <a href="../HowToUseGithub.html" class="btn-back">⬅ 返回主選單</a>
    <h1>透視眼模糊搜尋（按下 <span class="key">t</span>）</h1>
    <div class="demo-box">
        <h2>🛠 實際操作示範</h2>
        <p>在千百個檔案組成的大型網路專案中尋找某個檔案簡直是大海撈針。這個快捷鍵能瞬間拯救你。</p>
        <ol>
            <li>在專案的原始碼清單頁面中，點按 <span class="key">t</span> 鍵。</li>
            <li>原本的清單畫面會消失，取而代之的是上方出現一個簡單的搜尋輸入列。</li>
            <li>隨意輸入關鍵字（甚至可以不用按照順序拼對！例如尋找 <code>login_button_view.css</code>，你可以只輸入 <code>logbtn css</code>）。</li>
            <li>系統會以極快的速度模糊比對出所有的相關檔案路徑供你直接跳轉。</li>
        </ol>
    </div>
</div>
</body>
</html>
