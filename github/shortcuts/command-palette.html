<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>召喚駭客面板</title>
    <link rel="stylesheet" href="../style-github.css">
</head>
<body>
<div class="container">
    <a href="../HowToUseGithub.html" class="btn-back">⬅ 返回主選單</a>
    <h1>召喚駭客面板（按下 <span class="key">Ctrl</span> + <span class="key">K</span>）</h1>
    <div class="demo-box">
        <h2>🛠 實際操作示範</h2>
        <p>Command Palette 是現代工程師的必備武器，在 GitHub 上也完整重現了。</p>
        <ol>
            <li>在 GitHub 的任何分頁角落，同時按下 <span class="key">Ctrl</span> + <span class="key">K</span>（Mac 用戶請按 Cmd + K）。</li>
            <li>螢幕正上方會降下一個黑色搜尋面板。</li>
            <li>在這個面板裡，你不只可以搜尋專案，還可以：
                <ul>
                    <li>輸入 <code>/</code> 來搜尋機構內的各種使用者。</li>
                    <li>輸入 <code>></code> 來執行 GitHub 的內建系統指令（如切換深色淺色主題等）。</li>
                </ul>
            </li>
        </ol>
        <p><em>利用命令面板，手不用離開鍵盤也能完成所有滑鼠的工作。</em></p>
    </div>
</div>
</body>
</html>
