<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>色彩理論與混色圖學 | 藝術互動模擬</title>
    <meta name="description" content="互動式色彩理論：探索 RGB 加法混色、CMYK 減法混色，以及互補色與鄰近色配置。">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../tokens.css">
    <link rel="stylesheet" href="../../nav-global.css">
    <style>
        .page-container{max-width:var(--max-width-xl);margin:0 auto;padding:var(--space-6)}
        .page-hero{text-align:center;padding:var(--space-8) var(--space-4);margin-bottom:var(--space-6)}
        .page-hero h1{font-family:var(--font-heading);font-size:clamp(1.6rem,3.5vw,var(--text-3xl));
            background: linear-gradient(90deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #8b00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom:var(--space-2)}
        .page-hero p{color:var(--text-secondary);font-size:var(--text-base);max-width:600px;margin:0 auto}

        .sim-layout{display:grid;grid-template-columns:1fr 1fr;gap:var(--space-6);margin-bottom:var(--space-8)}
        @media(max-width:800px){.sim-layout{grid-template-columns:1fr}}
        
        .box-panel{background:var(--bg-surface);border:1px solid var(--border-color);border-radius:var(--border-radius-lg);padding:var(--space-6);display:flex;flex-direction:column}
        .box-panel h3{font-family:var(--font-heading);font-size:var(--text-xl);margin-bottom:var(--space-4);text-align:center}

        /* 混色實作區 */
        .color-mix-area{display:flex;justify-content:center;align-items:center;height:250px;position:relative;margin-bottom:var(--space-4);background:var(--bg-color);border-radius:var(--border-radius-md);overflow:hidden}
        .circle{width:150px;height:150px;border-radius:50%;position:absolute;mix-blend-mode:screen;filter:blur(2px)}
        .circle.r{background:#ff0000;top:20px;left:50%;transform:translateX(-50%)}
        .circle.g{background:#00ff00;bottom:20px;left:calc(50% - 40px)}
        .circle.b{background:#0000ff;bottom:20px;left:calc(50% + 40px)}
        
        /* 減法混色設定 */
        .mode-subtractive .color-mix-area{background:#ffffff} /* CMYK 必須在白底上 */
        .mode-subtractive .circle{mix-blend-mode:multiply}
        .mode-subtractive .circle.r{background:#00ffff} /* Cyan */
        .mode-subtractive .circle.g{background:#ff00ff} /* Magenta */
        .mode-subtractive .circle.b{background:#ffff00} /* Yellow */

        .slider-group{display:flex;flex-direction:column;gap:var(--space-3)}
        .ctrl-row{display:flex;align-items:center;gap:var(--space-3)}
        .ctrl-row label{width:30px;font-weight:700;font-family:var(--font-mono)}
        .ctrl-row input[type=range]{flex:1}
        #valR{color:#e74c3c} #valG{color:#2ecc71} #valB{color:#3498db}

        /* 配色建議區 (HSL) */
        .scheme-display{display:flex;gap:10px;height:100px;border-radius:var(--border-radius-md);overflow:hidden;margin-bottom:var(--space-4)}
        .swatch{flex:1;display:flex;align-items:flex-end;justify-content:center;padding-bottom:10px;font-family:var(--font-mono);font-size:var(--text-xs);font-weight:700;color:white;text-shadow:0 1px 2px rgba(0,0,0,0.8);transition:all var(--transition-md)}
        
        .toggle-row{display:flex;gap:var(--space-2);margin-bottom:var(--space-4)}
        .toggle-btn{flex:1;padding:var(--space-2);background:var(--bg-color);border:1px solid var(--border-color);border-radius:var(--border-radius-sm);cursor:pointer;font-weight:600;font-size:var(--text-sm);transition:all 0.2s}
        .toggle-btn.active{background:var(--text-primary);color:var(--bg-primary)}

    </style>
</head>
<body>
    <div class="page-container">
        <section class="page-hero">
            <h1>🎨 色彩理論與混色圖學</h1>
            <p>了解物理光學的 RGB 混色與顏料印表機的 CMYK 混色，並探索色相環上的互補色彩組合。</p>
        </section>

        <div class="sim-layout">
            <!-- 左側：物理混色 -->
            <div class="box-panel" id="mixPanel">
                <h3 id="mixTitle">光的三原色 (RGB 加法混色)</h3>
                
                <div class="color-mix-area">
                    <div class="circle r" id="c1"></div>
                    <div class="circle g" id="c2"></div>
                    <div class="circle b" id="c3"></div>
                </div>

                <div class="toggle-row" style="margin-bottom:var(--space-6)">
                    <button class="toggle-btn active" id="btnRGB" onclick="setMixMode('rgb')">光 (RGB 加法混色)</button>
                    <button class="toggle-btn" id="btnCMYK" onclick="setMixMode('cmyk')">顏料 (CMY 減法混色)</button>
                </div>

                <div class="slider-group">
                    <div class="ctrl-row">
                        <label id="lbl1">R</label>
                        <input type="range" id="param1" min="0" max="255" value="255" oninput="updateMix()">
                    </div>
                    <div class="ctrl-row">
                        <label id="lbl2">G</label>
                        <input type="range" id="param2" min="0" max="255" value="255" oninput="updateMix()">
                    </div>
                    <div class="ctrl-row">
                        <label id="lbl3">B</label>
                        <input type="range" id="param3" min="0" max="255" value="255" oninput="updateMix()">
                    </div>
                </div>
            </div>

            <!-- 右側：配色理論 -->
            <div class="box-panel">
                <h3>色相環配色計畫 (Color Schemes)</h3>
                
                <div class="scheme-display" id="swatchContainer">
                    <div class="swatch" id="sw1"></div>
                    <div class="swatch" id="sw2"></div>
                    <div class="swatch" id="sw3"></div>
                </div>

                <div class="toggle-row">
                    <button class="toggle-btn active" id="btnComp" onclick="setScheme('comp')">互補色 (Complementary)</button>
                    <button class="toggle-btn" id="btnAnal" onclick="setScheme('anal')">鄰近色 (Analogous)</button>
                    <button class="toggle-btn" id="btnTri" onclick="setScheme('tri')">三等分配色 (Triadic)</button>
                </div>
                
                <div style="margin-top:var(--space-4)">
                    <label style="display:block;margin-bottom:8px;font-size:14px;color:var(--text-secondary)">拖曳滑桿選擇基準色相 (Hue 0-360)</label>
                    <input type="range" id="hueBase" min="0" max="360" value="0" style="width:100%;background:linear-gradient(to right, #f00 0%, #ff0 17%, #0f0 33%, #0ff 50%, #00f 67%, #f0f 83%, #f00 100%);-webkit-appearance:none;height:12px;border-radius:6px" oninput="updateScheme()">
                </div>
                
                <p style="margin-top:var(--space-6);font-size:var(--text-sm);color:var(--text-secondary);line-height:1.5">
                    <strong>互補色：</strong>色相環上相對 180 度的顏色，具有強烈對比。<br>
                    <strong>鄰近色：</strong>色相環上相鄰的顏色 (±30度)，能創造和諧平靜的效果。<br>
                    <strong>三等分：</strong>色相環上相差 120 度的三個顏色，色彩豐富且平衡。
                </p>
            </div>
        </div>
        
        <footer class="site-footer"><p>&copy; 2025-2026 Interactive Teaching Portal.</p></footer>
    </div>

    <script src="../../nav-global.js"></script>
    <script>
        // 混色系統
        let mixMode = 'rgb';
        
        function setMixMode(mode) {
            mixMode = mode;
            const panel = document.getElementById('mixPanel');
            document.getElementById('btnRGB').classList.toggle('active', mode==='rgb');
            document.getElementById('btnCMYK').classList.toggle('active', mode==='cmyk');
            
            if(mode === 'rgb') {
                panel.classList.remove('mode-subtractive');
                document.getElementById('mixTitle').textContent = '光的三原色 (RGB 加法混色)';
                document.getElementById('lbl1').textContent = 'R'; document.getElementById('lbl1').style.color='#ff0000';
                document.getElementById('lbl2').textContent = 'G'; document.getElementById('lbl2').style.color='#00ff00';
                document.getElementById('lbl3').textContent = 'B'; document.getElementById('lbl3').style.color='#0000ff';
                document.getElementById('param1').value = 255;
                document.getElementById('param2').value = 255;
                document.getElementById('param3').value = 255;
            } else {
                panel.classList.add('mode-subtractive');
                document.getElementById('mixTitle').textContent = '顏料的三原色 (CMY 減法混色)';
                document.getElementById('lbl1').textContent = 'C'; document.getElementById('lbl1').style.color='#00ffff';
                document.getElementById('lbl2').textContent = 'M'; document.getElementById('lbl2').style.color='#ff00ff';
                document.getElementById('lbl3').textContent = 'Y'; document.getElementById('lbl3').style.color='#e6e600';
                // 為了視覺明顯，初始設定稍微有變化
                document.getElementById('param1').value = 255;
                document.getElementById('param2').value = 255;
                document.getElementById('param3').value = 255;
            }
            updateMix();
        }

        function updateMix() {
            const v1 = document.getElementById('param1').value;
            const v2 = document.getElementById('param2').value;
            const v3 = document.getElementById('param3').value;
            
            const c1 = document.getElementById('c1');
            const c2 = document.getElementById('c2');
            const c3 = document.getElementById('c3');

            if (mixMode === 'rgb') {
                c1.style.background = `rgb(${v1}, 0, 0)`;
                c2.style.background = `rgb(0, ${v2}, 0)`;
                c3.style.background = `rgb(0, 0, ${v3})`;
            } else {
                // CMY mode uses RGB to render on screen. 
                // C = (0, 255, 255)*density + white*(1-density) -> we handle via opacity in realistic multiply blend
                // However, mix-blend-mode: multiply works perfectly with full color and opacity.
                c1.style.background = `rgba(0, 255, 255, ${v1/255})`;
                c2.style.background = `rgba(255, 0, 255, ${v2/255})`;
                c3.style.background = `rgba(255, 255, 0, ${v3/255})`;
            }
        }

        // 配色系統
        let scheme = 'comp';

        function setScheme(s) {
            scheme = s;
            document.getElementById('btnComp').classList.toggle('active', s==='comp');
            document.getElementById('btnAnal').classList.toggle('active', s==='anal');
            document.getElementById('btnTri').classList.toggle('active', s==='tri');
            updateScheme();
        }

        // HSL to Hex utility for display
        function hslToHex(h, s, l) {
            l /= 100;
            const a = s * Math.min(l, 1 - l) / 100;
            const f = n => {
                const k = (n + h / 30) % 12;
                const color = l - a * Math.max(Math.min(k - 3, 9 - k, 1), -1);
                return Math.round(255 * color).toString(16).padStart(2, '0');
            };
            return `#${f(0)}${f(8)}${f(4)}`.toUpperCase();
        }

        function updateScheme() {
            let h = parseInt(document.getElementById('hueBase').value);
            let s = 80;
            let l = 50;

            const sw1 = document.getElementById('sw1');
            const sw2 = document.getElementById('sw2');
            const sw3 = document.getElementById('sw3');
            
            sw1.style.display = 'flex';
            sw2.style.display = 'flex';
            sw3.style.display = 'flex';

            let h1=h, h2, h3;

            if (scheme === 'comp') {
                h2 = (h + 180) % 360;
                sw1.style.background = `hsl(${h1}, ${s}%, ${l}%)`; sw1.textContent = hslToHex(h1, s, l);
                sw2.style.background = `hsl(${h2}, ${s}%, ${l}%)`; sw2.textContent = hslToHex(h2, s, l);
                sw3.style.display = 'none'; // 互補色只有兩個
            } else if (scheme === 'anal') {
                h2 = (h + 30) % 360;
                h3 = (h + 330) % 360; // or h-30
                sw1.style.background = `hsl(${h3}, ${s}%, ${l}%)`; sw1.textContent = hslToHex(h3, s, l);
                sw2.style.background = `hsl(${h1}, ${s}%, ${l}%)`; sw2.textContent = hslToHex(h1, s, l);
                sw3.style.background = `hsl(${h2}, ${s}%, ${l}%)`; sw3.textContent = hslToHex(h2, s, l);
            } else if (scheme === 'tri') {
                h2 = (h + 120) % 360;
                h3 = (h + 240) % 360;
                sw1.style.background = `hsl(${h1}, ${s}%, ${l}%)`; sw1.textContent = hslToHex(h1, s, l);
                sw2.style.background = `hsl(${h2}, ${s}%, ${l}%)`; sw2.textContent = hslToHex(h2, s, l);
                sw3.style.background = `hsl(${h3}, ${s}%, ${l}%)`; sw3.textContent = hslToHex(h3, s, l);
            }
        }

        // Init
        setTimeout(() => {
            setMixMode('rgb');
            updateScheme();
        }, 50);

    </script>
</body>
</html>
