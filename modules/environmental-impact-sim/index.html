<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>海岸守護者：氣候韌性模擬器 | Coastal Guardian</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Outfit:wght@300;400;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-container">
        <!-- Header -->
        <header class="glass-panel">
            <div class="logo">
                <i class="fa-solid fa-earth-asia"></i>
                <h1>海岸守護者 <span class="subtitle">氣候韌性模擬器</span></h1>
            </div>
            <div class="status-bar">
                <div class="status-item">
                    <span class="label">人口</span>
                    <span class="value" id="population-display">0</span>
                </div>
                <div class="status-item">
                    <span class="label">資金</span>
                    <span class="value" id="budget-display">$0</span>
                </div>
                <div class="status-item">
                    <span class="label">韌性指數</span>
                    <span class="value" id="resilience-display">0%</span>
                </div>
                <div class="status-item highlight">
                    <span class="label">當前海平面</span>
                    <span class="value text-warning" id="sea-level-display">+0m</span>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main>
            <!-- Left Panel: Map -->
            <section class="map-view glass-panel">
                <div class="map-controls">
                    <button class="btn-icon active" title="標準視圖"><i class="fa-solid fa-layer-group"></i></button>
                    <button class="btn-icon" title="地形視圖" id="toggle-heatmap"><i
                            class="fa-solid fa-mountain-sun"></i></button>
                    <button class="btn-icon" title="災害風險視圖" id="toggle-risk"><i
                            class="fa-solid fa-house-tsunami"></i></button>
                </div>
                <div id="simulation-grid" class="grid-container">
                    <!-- Grid generated by JS -->
                </div>
                <div class="map-legend">
                    <div class="legend-item"><span class="color-box deep-water"></span>深海</div>
                    <div class="legend-item"><span class="color-box water"></span>淺海</div>
                    <div class="legend-item"><span class="color-box sand"></span>沙灘</div>
                    <div class="legend-item"><span class="color-box grass"></span>平原</div>
                    <div class="legend-item"><span class="color-box forest"></span>森林</div>
                    <div class="legend-item"><span class="color-box mountain"></span>高地</div>
                    <div class="legend-item"><span class="color-box city"></span>城市</div>
                </div>
            </section>

            <!-- Right Panel: Controls & feedback -->
            <aside class="control-panel">

                <!-- Tool Palette -->
                <div class="panel-section glass-panel">
                    <h3>城市規劃 <small>點擊地圖建設</small></h3>
                    <div class="tools-grid">
                        <button class="tool-btn active" data-tool="inspect">
                            <i class="fa-solid fa-arrow-pointer"></i>
                            <span>觀察</span>
                        </button>
                        <button class="tool-btn" data-tool="residential" data-cost="500">
                            <i class="fa-solid fa-building"></i>
                            <span>住宅區</span>
                            <span class="cost">$500</span>
                        </button>
                        <button class="tool-btn" data-tool="commercial" data-cost="1000">
                            <i class="fa-solid fa-briefcase"></i>
                            <span>商業區</span>
                            <span class="cost">$1k</span>
                        </button>
                        <button class="tool-btn" data-tool="seawall" data-cost="2000">
                            <i class="fa-solid fa-bridge-water"></i>
                            <span>防波堤</span>
                            <span class="cost">$2k</span>
                        </button>
                        <button class="tool-btn" data-tool="wetland" data-cost="800">
                            <i class="fa-solid fa-plant-wilt"></i>
                            <span>復育濕地</span>
                            <span class="cost">$800</span>
                        </button>
                        <button class="tool-btn remove" data-tool="demolish" data-cost="100">
                            <i class="fa-solid fa-eraser"></i>
                            <span>拆除</span>
                            <span class="cost">$100</span>
                        </button>
                    </div>
                </div>

                <!-- Climate Simulation Controls -->
                <div class="panel-section glass-panel disaster-control">
                    <h3>氣候災害模擬</h3>

                    <div class="control-group">
                        <label for="sea-level-slider">海平面上升預測 (公尺)</label>
                        <div class="slider-container">
                            <span>0m</span>
                            <input type="range" id="sea-level-slider" min="0" max="6" step="0.5" value="0">
                            <span>6m</span>
                        </div>
                        <div class="value-readout" id="slider-val">目前設定: +0m</div>
                    </div>

                    <div class="action-buttons">
                        <button id="sim-tide" class="action-btn secondary">
                            <i class="fa-solid fa-water"></i> 模擬大潮
                        </button>
                        <button id="sim-storm" class="action-btn warning">
                            <i class="fa-solid fa-hurricane"></i> 模擬風暴潮
                        </button>
                    </div>
                </div>

                <!-- Analysis/Log -->
                <div class="panel-section glass-panel log-section">
                    <h3>環境影響評估</h3>
                    <div id="event-log" class="event-log">
                        <div class="log-entry system">
                            <span class="time">系統</span>
                            <span class="content">模擬器已啟動。請開始規劃您的海岸城市。</span>
                        </div>
                    </div>
                </div>
            </aside>
        </main>
    </div>

    <!-- Modal for details/results -->
    <div id="result-modal" class="modal hidden">
        <div class="modal-content glass-panel">
            <h2 id="modal-title">模擬結果</h2>
            <div id="modal-body"></div>
            <button id="close-modal" class="action-btn primary">關閉</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
