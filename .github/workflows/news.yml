#Action的WorkFlows名稱
name: 每日新聞自動剪報
#觸發條件
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest
    # 也可以加入環境變數強制使用 Node.js 24，但升級套件版本通常就足夠了
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      
    steps:
      - name: 取得程式碼 (Checkout)
        # 升級至 v4 以解決 Node.js 20 棄用警告
        uses: actions/checkout@v4

      - name: 設定 Python 環境
        # 升級至 v5 以解決 Node.js 20 棄用警告
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 執行 Python 腳本產生網頁
        # 指定執行 news 目錄下的 python 檔案
        run: python news/update_news.py

      - name: 提交變更並推播 (Commit and Push)
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          # 這裡預設你的腳本還是將 index.html 寫在根目錄
          git add news/
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update news page" && git push)