# 劇本名稱
name: 每日新聞自動剪報

# 什麼時候觸發？
on:
  schedule:
    - cron: '0 0 * * *'  # 每天早上 8 點執行 (UTC 時間 0 點)
  workflow_dispatch:     # 允許我隨時手動點擊按鈕執行

jobs:
  build:
    runs-on: ubuntu-latest # 跟 GitHub 免費借一台 Linux 電腦
    steps:
      - name: 把我的資料夾下載到這台電腦
        uses: actions/checkout@v3

      - name: 安裝 Python 環境
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: 執行我的新聞抓取腳本
        run: |
          pip install feedparser  # 安裝讀取 RSS 的工具
          python main.py          # 執行抓新聞並產生 md 檔

      - name: 把產生的新聞檔案「自動存檔」回 GitHub
        run: |
          git config user.name "GitHub 機器人"
          git config user.email "bot@github.com"
          git add .
          git commit -m "📝 更新今日新聞匯整"
          git push